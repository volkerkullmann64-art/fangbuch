<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Fangübersicht</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f5; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 100%; margin: 0 auto; }
        .header-bereich { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 15px auto; padding: 0 10px; }
        h2 { color: #2e6f40; margin: 0; font-size: 20px; }
        .user-info { font-size: 13px; color: #666; background: #e8ede9; padding: 6px 12px; border-radius: 20px; border: 1px solid #cbdad0; }
        .tabellen-container { background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; white-space: nowrap; }
        thead tr { background: #333; color: white; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        .zurueck-link { display: block; text-align: center; margin-top: 25px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bereich">
        <h2>📊 Meine Fangübersicht</h2>
        <div class="user-info">Angler: <span id="angler-name">Lade...</span></div>
    </div>

    <div class="tabellen-container">
        <table>
            <thead>
                <tr>
                    <th>Datum</th>
                    <th>Uhrzeit</th>
                    <th>Fangort</th>
                    <th>Fischart</th>
                    <th>Länge</th>
                    <th>Gewicht</th>
                    <th>Verbleib</th>
                    <th>Wetter</th>
                    <th>Luftdruck</th>
                    <th>Trübung</th>
                    <th>Notiz</th>
                </tr>
            </thead>
            <tbody id="fang-tabelle-body">
                <tr><td colspan="12" style="text-align: center; padding: 20px;">Prüfe Anmeldung...</td></tr>
            </tbody>
        </table>
    </div>

    <a href="index.html" class="zurueck-link">⬅ Zurück zum Dashboard</a>
</div>

<script>
    // Supabase Konfiguration
    const SUPABASE_URL = "https://eadleysrezkhxxbhqbdx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Y0g8anBpKs3bsC85iado6w_rYske-SZ";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        // Holt die E-Mail aus dem Session-Speicher
        let anglerEmail = sessionStorage.getItem('userEmail');

        if (!anglerEmail) {
            alert("Du bist nicht angemeldet!");
            location.href = 'index.html';
            return;
        }

        document.getElementById('angler-name').innerText = anglerEmail;
        ladeFaengeFuerAngler(anglerEmail);
    };

    async function ladeFaengeFuerAngler(email) {
        try {
            const { data, error } = await _supabase
                .from('fangbuch-asv-langschede')
                .select('*')
                .eq('angler_email', email) // Hier wird auf deine E-Mail gefiltert
                .order('datum', { ascending: false });

            if (error) throw error;

            const tbody = document.getElementById('fang-tabelle-body');
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="12" style="text-align: center; padding: 20px;">Keine Fänge unter dieser E-Mail gefunden.</td></tr>`;
                return;
            }

            tbody.innerHTML = ''; 
            data.forEach(fang => {
                tbody.innerHTML += `
                    <tr>
                        <td>${fang.datum || '-'}</td>
                        <td>${fang.uhrzeit ? fang.uhrzeit.substring(0,5) : '-'}</td>
                        <td>${fang.fangort || '-'}</td>
                        <td style="font-weight: bold; color: #2e6f40;">${fang.fischart || '-'}</td>
                        <td>${fang.laenge ? fang.laenge + ' cm' : '-'}</td>
                        <td>${fang.gewicht ? fang.gewicht + ' kg' : '-'}</td>
                        <td>${fang.verbleib || '-'}</td>
                        <td>${fang.wetter || '-'}</td>
                        <td>${fang.luftdruck ? fang.luftdruck + ' hPa' : '-'}</td>
                        <td>${fang.truebung || '-'}</td>
                        <td>${fang.notiz || '-'}</td>
                    </tr>
                `;
            });
        } catch (fehler) {
            document.getElementById('fang-tabelle-body').innerHTML = `<tr><td colspan="12" style="color: red; padding: 20px;">Fehler: ${fehler.message}</td></tr>`;
        }
    }
</script>

</body>
</html>
