<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fangbuch ASV Landshut</title>
    <!-- Supabase JavaScript Bibliothek laden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        
        .login-box { background: #eef2f3; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #dcdde1; text-align: center; }
        .login-box input { width: 250px; padding: 8px; margin-left: 10px; border: 1px solid #ccc; border-radius: 4px; }
        
        .main-container { display: flex; gap: 30px; }
        .form-section { flex: 1; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .list-section { flex: 1; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        h3 { color: #34495e; border-bottom: 2px solid #2ecc71; padding-bottom: 8px; margin-top: 0; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; color: #2c3e50; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        button.btn-block { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button.btn-block:hover { background-color: #27ae60; }
        
        .fang-item { padding: 12px; border-bottom: 1px solid #eee; margin-bottom: 8px; background: #fafafa; border-radius: 4px; }
        .fang-item:last-child { border-bottom: none; }
        .fang-meta { font-size: 12px; color: #7f8c8d; line-height: 1.5; }
    </style>
</head>
<body>

    <h2>🎣 Fangbuch ASV Landshut</h2>

    <!-- E-Mail / Login Bereich oben drüber -->
    <div class="login-box">
        <label style="display:inline-block;"><strong>Angler E-Mail-Adresse:</strong></label>
        <input type="email" id="angler_email" required placeholder="name@beispiel.de" oninput="loadMyCatches()">
    </div>

    <!-- Das schöne Layout: Nebeneinander -->
    <div class="main-container">
        
        <!-- LINKE SEITE: EINGABE -->
        <div class="form-section">
            <h3>Neuen Fang eintragen</h3>
            <form id="fangForm">
                <div class="form-group">
                    <label for="datum">Datum:</label>
                    <input type="date" id="datum" required>
                </div>

                <div class="form-group">
                    <label for="uhrzeit">Uhrzeit:</label>
                    <input type="time" id="uhrzeit" required>
                </div>

                <div class="form-group">
                    <label for="fischart">Fischart:</label>
                    <select id="fischart" required onchange="berechneGewicht()">
                        <option value="">-- Bitte wählen --</option>
                        <option value="Bachforelle">Bachforelle</option>
                        <option value="Regenbogenforelle">Regenbogenforelle</option>
                        <option value="Äsche">Äsche</option>
                        <option value="Zander">Zander</option>
                        <option value="Wels">Wels</option>
                        <option value="Hecht">Hecht</option>
                        <option value="Karpfen">Karpfen</option>
                        <option value="Anderer Fisch">Anderer Fisch</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="laenge">Länge (cm):</label>
                    <input type="number" id="laenge" required min="1" oninput="berechneGewicht()">
                </div>

                <div class="form-group">
                    <label for="gewicht">Gewicht (g) <small style="color:#7f8c8d;">(wird automatisch geschätzt)</small>:</label>
                    <input type="number" id="gewicht" required>
                </div>

                <div class="form-group">
                    <label for="verbleib">Verbleib des Fisches:</label>
                    <select id="verbleib">
                        <option value="Entnommen">Entnommen</option>
                        <option value="Zurückgesetzt">Zurückgesetzt (Catch & Release)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fangort">Fangplatz / Stelle:</label>
                    <input type="text" id="fangort" placeholder="z.B. Vereinsheim, Wehr...">
                </div>

                <div class="form-group">
                    <label for="wetter">Wetter:</label>
                    <select id="wetter">
                        <option value="Sonnig">Sonnig</option>
                        <option value="Bewölkt">Bewölkt</option>
                        <option value="Regen">Regen</option>
                        <option value="Nebel">Nebel</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="luftdruck">Luftdruck (hPa):</label>
                    <input type="number" id="luftdruck" placeholder="z.B. 1013">
                </div>

                <div class="form-group">
                    <label for="truebung">Wasser-Trübung:</label>
                    <select id="truebung">
                        <option value="Klar">Klar</option>
                        <option value="Leicht getrübt">Leicht getrübt</option>
                        <option value="Stark getrübt">Stark getrübt</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notiz">Besondere Notizen / Köder:</label>
                    <textarea id="notiz" rows="2" placeholder="Welcher Köder?..."></textarea>
                </div>

                <button type="submit" class="btn-block">🚀 Fang online speichern</button>
            </form>
        </div>
        
        <!-- RECHTE SEITE: LISTE -->
        <div class="list-section">
            <h3>📋 Meine persönlichen Fänge</h3>
            <div id="catchesList" style="margin-top: 15px;">
                <p style="text-align:center; color:#7f8c8d;">Bitte gib oben deine E-Mail-Adresse ein, um deine Fänge zu laden.</p>
            </div>
        </div>

    </div>

    <script>
        // Supabase Verbindung
        const SUPABASE_URL = "https://sb_publishable_Y0g8anBpKs3bsC85iado6w_rYske-SZ.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Y0g8anBpKs3bsC85iado6w_rYske-SZ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Automatisches Datum & Uhrzeit beim Laden setzen
        const heute = new Date();
        document.getElementById('datum').value = heute.toISOString().split('T')[0];
        document.getElementById('uhrzeit').value = heute.toTimeString().split(' ')[0].substring(0,5);

        // Automatische Gewichtsberechnung nach Fischart (Konditionsfaktor)
        function berechneGewicht() {
            const fischart = document.getElementById('fischart').value;
            const laenge = parseFloat(document.getElementById('laenge').value);
            const gewichtFeld = document.getElementById('gewicht');
            
            if (!fischart || !laenge) return;

            let k = 1.0; // Standard-Faktor
            if (fischart === "Bachforelle" || fischart === "Regenbogenforelle") k = 1.1;
            else if (fischart === "Äsche") k = 0.8;
            else if (fischart === "Zander") k = 0.85;
            else if (fischart === "Hecht") k = 0.7;
            else if (fischart === "Karpfen") k = 2.0;
            else if (fischart === "Wels") k = 0.6;

            // Formel: Gewicht = (Länge^3 * k) / 100
            let berechnet = Math.round((Math.pow(laenge, 3) * k) / 100);
            gewichtFeld.value = berechnet;
        }

        // Formular absenden -> In Supabase speichern
        document.getElementById('fangForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('angler_email').value;
            if (!email) {
                alert('Bitte trage zuerst oben deine E-Mail-Adresse ein!');
                return;
            }
            
            const data = {
                angler_email: email,
                datum: document.getElementById('datum').value,
                uhrzeit: document.getElementById('uhrzeit').value,
                fischart: document.getElementById('fischart').value,
                laenge: parseInt(document.getElementById('laenge').value) || 0,
                gewicht: parseInt(document.getElementById('gewicht').value) || 0,
                verbleib: document.getElementById('verbleib').value,
                fangort: document.getElementById('fangort').value,
                wetter: document.getElementById('wetter').value,
                luftdruck: parseInt(document.getElementById('luftdruck').value) || 0,
                truebung: document.getElementById('truebung').value,
                notiz: document.getElementById('notiz').value
            };

            const { error } = await _supabase.from('faenge').insert([data]);

            if (error) {
                alert('Fehler beim Speichern: ' + error.message);
            } else {
                alert('🎉 Fang erfolgreich in der Online-Datenbank gespeichert!');
                document.getElementById('fangForm').reset();
                document.getElementById('angler_email').value = email; // E-Mail stehen lassen
                document.getElementById('datum').value = heute.toISOString().split('T')[0];
                document.getElementById('uhrzeit').value = heute.toTimeString().split(' ')[0].substring(0,5);
                loadMyCatches(); // Liste sofort aktualisieren
            }
        });

        // Eigene Fänge aus der DB laden
        async function loadMyCatches() {
            const email = document.getElementById('angler_email').value;
            const listDiv = document.getElementById('catchesList');
            
            if (!email) {
                listDiv.innerHTML = "<p style='text-align:center; color:#7f8c8d;'>Bitte gib oben deine E-Mail-Adresse ein, um deine Fänge zu laden.</p>";
                return;
            }

            const { data, error } = await _supabase
                .from('faenge')
                .select('*')
                .eq('angler_email', email)
                .order('datum', { ascending: false });

            if (error) {
                listDiv.innerHTML = "<span style='color:red;'>Fehler beim Laden: " + error.message + "</span>";
                return;
            }

            if (data.length === 0) {
                listDiv.innerHTML = "<p style='text-align:center; color:#7f8c8d;'>Noch keine Fänge für diese E-Mail in der Datenbank.</p>";
                return;
            }

            listDiv.innerHTML = "";
            data.forEach(fang => {
                const item = document.createElement('div');
                item.className = 'fang-item';
                item.innerHTML = `
                    <strong>${fang.fischart}</strong> - ${fang.laenge} cm (${fang.gewicht} g)<br>
                    <span class="fang-meta">📅 ${fang.datum} | ⏰ ${fang.uhrzeit} Uhr | 📍 ${fang.fangort || 'Kein Ort'}<br>
                    🌦️ ${fang.wetter} | 🎈 ${fang.luftdruck ? `${fang.luftdruck} hPa` : '---'} | 🌊 ${fang.truebung}</span>
                    ${fang.notiz ? `<br><small style='color:#555;'>📝 ${fang.notiz}</small>` : ''}
                `;
                listDiv.appendChild(item);
            });
        }
    </script>
</body>
</html>
