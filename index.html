<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fangbuch ASV Landshut</title>
    <!-- Supabase JavaScript Bibliothek laden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        h2, h3 { color: #2c3e50; text-align: center; }
        .tab-nav { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background-color: #bdc3c7; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background-color: #2ecc71; color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #34495e; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button.btn-block { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button.btn-block:hover { background-color: #27ae60; }
        .fang-item { padding: 12px; border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .fang-item:last-child { border-bottom: none; }
        .fang-meta { font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

    <h2>🎣 Fangbuch ASV Landshut</h2>

    <!-- Navigation für die Tabs -->
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('eingabe')">Fang eintragen</button>
        <button class="tab-btn" onclick="switchTab('liste'); loadMyCatches();">Meine Fänge</button>
    </div>

    <!-- TAB 1: EINGABEFORMULAR -->
    <div id="eingabe" class="tab-content active">
        <form id="fangForm">
            <label for="angler_email">Deine E-Mail-Adresse:</label>
            <input type="email" id="angler_email" required placeholder="name@beispiel.de">

            <label for="datum">Datum:</label>
            <input type="date" id="datum" required>

            <label for="uhrzeit">Uhrzeit:</label>
            <input type="time" id="uhrzeit" required>

            <label for="fischart">Fischart:</label>
            <select id="fischart" required>
                <option value="">-- Bitte wählen --</option>
                <option value="Bachforelle">Bachforelle</option>
                <option value="Regenbogenforelle">Regenbogenforelle</option>
                <option value="Äsche">Äsche</option>
                <option value="Zander">Zander</option>
                <option value="Wels">Wels</option>
                <option value="Hecht">Hecht</option>
                <option value="Karpfen">Karpfen</option>
                <option value="Anderer Fisch">Anderer Fisch</option>
            </select>

            <label for="laenge">Länge (cm):</label>
            <input type="number" id="laenge" required min="1">

            <label for="gewicht">Gewicht (g):</label>
            <input type="number" id="gewicht" placeholder="Optional">

            <label for="verbleib">Verbleib des Fisches:</label>
            <select id="verbleib">
                <option value="Entnommen">Entnommen</option>
                <option value="Zurückgesetzt">Zurückgesetzt (Catch & Release)</option>
            </select>

            <label for="fangort">Fangplatz / Stelle:</label>
            <input type="text" id="fangort" placeholder="z.B. Vereinsheim, Wehr, km 42...">

            <label for="wetter">Wetter:</label>
            <select id="wetter">
                <option value="Sonnig">Sonnig</option>
                <option value="Bewölkt">Bewölkt</option>
                <option value="Regen">Regen</option>
                <option value="Nebel">Nebel</option>
            </select>

            <label for="luftdruck">Luftdruck (hPa):</label>
            <input type="number" id="luftdruck" placeholder="z.B. 1013">

            <label for="truebung">Wasser-Trübung:</label>
            <select id="truebung">
                <option value="Klar">Klar</option>
                <option value="Leicht getrübt">Leicht getrübt</option>
                <option value="Stark getrübt / Hochwasser">Stark getrübt / Hochwasser</option>
            </select>

            <label for="notiz">Besondere Notizen / Köder:</label>
            <textarea id="notiz" rows="3" placeholder="Welcher Köder? Wasserstand?..."></textarea>

            <button type="submit" class="btn-block">🚀 Fang in Datenbank speichern</button>
        </form>
    </div>

    <!-- TAB 2: PERSÖNLICHE LISTE -->
    <div id="liste" class="tab-content">
        <h3>📋 Deine persönlichen Fänge</h3>
        <p style="font-size: 13px; color: #7f8c8d; text-align: center;">Es werden die Fänge der oben eingegebenen E-Mail-Adresse angezeigt.</p>
        <div id="catchesList">Gib im ersten Tab deine E-Mail ein, um deine Fänge zu sehen.</div>
    </div>

    <script>
        // Supabase Verbindung aufbauen mit deinen Daten
        const SUPABASE_URL = "https://sb_publishable_Y0g8anBpKs3bsC85iado6w_rYske-SZ.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Y0g8anBpKs3bsC85iado6w_rYske-SZ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Automatisches Datum & Uhrzeit beim Laden setzen
        const heute = new Date();
        document.getElementById('datum').value = heute.toISOString().split('T')[0];
        document.getElementById('uhrzeit').value = heute.toTimeString().split(' ')[0].substring(0,5);

        // Tab-Wechsel Logik
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // Formular absenden -> In Supabase speichern
        document.getElementById('fangForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                angler_email: document.getElementById('angler_email').value,
                datum: document.getElementById('datum').value,
                uhrzeit: document.getElementById('uhrzeit').value,
                fischart: document.getElementById('fischart').value,
                laenge: parseInt(document.getElementById('laenge').value) || 0,
                gewicht: parseInt(document.getElementById('gewicht').value) || 0,
                verbleib: document.getElementById('verbleib').value,
                fangort: document.getElementById('fangort').value,
                wetter: document.getElementById('wetter').value,
                luftdruck: parseInt(document.getElementById('luftdruck').value) || 0,
                truebung: document.getElementById('truebung').value,
                notiz: document.getElementById('notiz').value
            };

            const { error } = await _supabase.from('faenge').insert([data]);

            if (error) {
                alert('Fehler beim Speichern: ' + error.message);
            } else {
                alert('🎉 Fang erfolgreich in der Online-Datenbank gespeichert!');
                document.getElementById('fangForm').reset();
                // Datum wieder setzen
                document.getElementById('datum').value = heute.toISOString().split('T')[0];
                document.getElementById('uhrzeit').value = heute.toTimeString().split(' ')[0].substring(0,5);
            }
        });

        // Eigene Fänge aus der DB laden
        async function loadMyCatches() {
            const email = document.getElementById('angler_email').value;
            const listDiv = document.getElementById('catchesList');
            
            if (!email) {
                listDiv.innerHTML = "<p style='color:red; text-align:center;'>Bitte trage zuerst im Formular deine E-Mail-Adresse ein!</p>";
                return;
            }

            listDiv.innerHTML = "Lädt Fänge...";

            const { data, error } = await _supabase
                .from('faenge')
                .select('*')
                .eq('angler_email', email)
                .order('datum', { ascending: false });

            if (error) {
                listDiv.innerHTML = "Fehler beim Laden: " + error.message;
                return;
            }

            if (data.length === 0) {
                listDiv.innerHTML = "<p style='text-align:center;'>Noch keine Fänge für diese E-Mail eingetragen.</p>";
                return;
            }

            listDiv.innerHTML = "";
            data.forEach(fang => {
                const item = document.createElement('div');
                item.className = 'fang-item';
                item.innerHTML = `
                    <strong>${fang.fischart}</strong> - ${fang.laenge} cm ${fang.gewicht ? `(${fang.gewicht} g)` : ''}<br>
                    <span class="fang-meta">📅 ${fang.datum} um ${fang.uhrzeit} Uhr | 📍 Ort: ${fang.fangort || 'Nicht angegeben'}</span><br>
                    <span class="fang-meta">🌦️ ${fang.wetter}, ${fang.luftdruck ? `${fang.luftdruck} hPa` : 'Kein Luftdruck'}, Wasser: ${fang.truebung}</span>
                    ${fang.notiz ? `<br><small>📝 <em>${fang.notiz}</em></small>` : ''}
                `;
                listDiv.appendChild(item);
            });
        }
    </script>
</body>
</html>
